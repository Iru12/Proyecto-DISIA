services:
  train:
    build:
        context: .
        dockerfile: DockerFile.train
    command: ["sh", "-c", "python src/ingesta_datos.py && python src/preprocesamiento.py && python src/train.py"]
    volumes:
      - ./models_output:/app/modelos
      - ./data_output:/app/datos/preprocesados
    environment:
      - MODEL_VERSION=${MODEL_VERSION:-RF_v1}
      - N_ESTIMATORS=${N_ESTIMATORS:-120}
      - MIN_SAMPLES_LEAF=${MIN_SAMPLES_LEAF:-2}
      - RANDOM_STATE=${RANDOM_STATE:-42}
      - CLASS_WEIGHT=${CLASS_WEIGHT:-balanced_subsample}
  inferencia:
    build:
      context: .
      dockerfile: DockerFile.inferencia
    container_name: api
    ports:
      - "8000:8000"
    volumes:
      - ./models_output:/app/modelos
      - ./data_output:/app/datos/preprocesados
    environment:
      - MODELO_PATH=/app/modelos/RF_model.joblib
      - ARTEFACTOS_PATH=/app/datos/preprocesados/artefactos_inferencia.joblib
      - DRIFT_REFERENCE_PATH=/app/datos/preprocesados/drift_reference.json
      - MODEL_METADATA_PATH=/app/modelos/current_model_metadata.json
      - MODEL_SELECTION_HISTORY_PATH=/app/modelos/model_selection_history.jsonl
      - ALERT_HISTORY_PATH=/app/modelos/alerts_history.jsonl
      - ALERT_OPERATIONAL_WINDOW_SIZE=50
      - ALERT_OPERATIONAL_MIN_WINDOW_SIZE=10
      - ALERT_ERROR_RATE_THRESHOLD=0.30
      - ALERT_LATENCY_P95_THRESHOLD=3.0
      - ALERT_MODEL_F1_MACRO_MIN=0.90
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:v3.7.3
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - inferencia

  grafana:
    image: grafana/grafana:12.3.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=light
    depends_on:
      - prometheus
